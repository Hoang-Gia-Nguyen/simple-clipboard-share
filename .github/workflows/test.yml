name: Test and Deploy Cloudflare Worker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cf-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./cf-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cf-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./cf-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate wrangler.toml from example
        run: |
          cp wrangler.example.toml wrangler.toml
          sed -i "s/your_kv_id/${{ secrets.KV_NAMESPACE_ID }}/g" wrangler.toml
          sed -i "s/your\\.domain\\.com/bin.hgnlab.org/g" wrangler.toml
          # Remove [vars] section so EXPECTED_SECRET can be set as a secret
          sed -i '/^\[ *vars *\]/,/^\[/{/^\[ *vars *\]/d; /^\[/!d;}' wrangler.toml

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Delete existing EXPECTED_SECRET env var (if any)
        run: |
          curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/413137e64b948d84ccd11c8b97614d1f/workers/scripts/quick-note/environment-variables/EXPECTED_SECRET" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" || true

      - name: Set EXPECTED_SECRET
        run: echo "${{ secrets.WORKER_SECRET }}" | npx wrangler secret put EXPECTED_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
