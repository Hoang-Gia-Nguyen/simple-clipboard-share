services:
  notepad:
    build:
      context: .
      dockerfile: Dockerfile
    image: hgnguyen37/simple-clipboard
    container_name: my_simple_note
    environment:
      - SECRET_KEY=abcx
    ports:
      - "8099:80"
    volumes:
      - ./data-test.txt:/var/www/html/data.txt   # Mount personal txt file
    restart: always